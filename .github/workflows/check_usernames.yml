name: Instagram Username Hunter

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Hunter
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python hunter.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "InstaHunterBot"
          git config --global user.email "bot@instahunter.com"
          git add state.json hits.txt
          git commit -m "Update state and hits [skip ci]" || echo "No changes to commit"
          git push
